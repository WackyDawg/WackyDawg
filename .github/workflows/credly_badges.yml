name: Update Badges

on:
  schedule:
    - cron: "0 2 * * *"   
  workflow_dispatch:        

jobs:
  update-badges:
    name: Update README with Credly Badges
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Update Badges
        uses: pemtajo/badge-readme@main
        with:
          CREDLY_USER: julian-nwadinobi.aa0c6c6c   
          NUMBER_LAST_BADGES: 0             
